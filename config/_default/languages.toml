# ==========================================
# 1. 简体中文 (默认基座)
# ==========================================
[zh]
    languageName = "简体中文"
    languageCode = "zh"
    title = "我的博客"
    weight = 1

    # 【核心规则】：params 必须写在前面
    [zh.params.sidebar]
        subtitle = "专注技术与生活分享的个人博客"
    [zh.params.footer]
        customText = "[站点地图 (Sitemap)](/sitemap.xml)"

    # 【核心规则】：menu 数组必须写在最后
    [[zh.menu.main]]
        name = "首页"
        url = "/"
        weight = 1
        [zh.menu.main.params]
            icon = "home"

    [[zh.menu.main]]
        name = "归档"
        url = "/archives/"
        weight = 2
        [zh.menu.main.params]
            icon = "archives"

    [[zh.menu.main]]
        name = "搜索"
        url = "/search/"
        weight = 3
        [zh.menu.main.params]
            icon = "search"

# ==========================================
# 2. 英语 (全球通用长尾流量)
